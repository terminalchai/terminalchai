  <text x="28" y="128" fill="#CBD5E1" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="16">Beautiful code screenshots with 22+ themes,</text>
  <text x="28" y="151" fill="#CBD5E1" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="16">gradients, and PNG or SVG export.</text>
