  <text x="46" y="44" fill="#6EE7B7" font-family="'JetBrains Mono', Consolas, monospace" font-size="12">tooling</text>
  <text x="28" y="98" fill="#F8FAFC" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="30" font-weight="700">Mockdata Run</text>
  <text x="28" y="128" fill="#CBD5E1" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="16">Schema-driven mock datasets for demos, QA,</text>
  <text x="28" y="151" fill="#CBD5E1" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="16">and prototype payload generation.</text>
