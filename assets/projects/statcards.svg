  <rect x="28" y="28" width="66" height="24" rx="12" fill="#191924" stroke="#282839"/>
  <text x="46" y="44" fill="#67E8F9" font-family="'JetBrains Mono', Consolas, monospace" font-size="12">visual</text>
  <text x="28" y="98" fill="#F8FAFC" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="32" font-weight="700">Statcards</text>
  <text x="28" y="128" fill="#CBD5E1" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="16">Beautiful GitHub stats cards with multiple themes,</text>
  <text x="28" y="151" fill="#CBD5E1" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="16">PNG export, and zero-backend deployment.</text>
