  <text x="228" y="196" fill="#67E8F9" font-family="'JetBrains Mono', Consolas, monospace" font-size="12">SVG Export</text>
  <rect x="390" y="44" width="122" height="154" rx="20" fill="#101018" stroke="#2B2B3A"/>
  <rect x="407" y="64" width="24" height="88" rx="10" fill="#0F172A"/>
  <rect x="438" y="96" width="24" height="56" rx="10" fill="#1D4ED8"/>
