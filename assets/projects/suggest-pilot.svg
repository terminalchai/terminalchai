<svg width="560" height="280" viewBox="0 0 560 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SuggestPilot project card</title>
  <desc id="desc">Chai-themed feature card for SuggestPilot.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="560" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0F"/>
      <stop offset="1" stop-color="#151520"/>
    </linearGradient>
    <linearGradient id="accent" x1="386" y1="22" x2="520" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F472B6"/>
      <stop offset="1" stop-color="#DB2777" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="560" height="280" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="558" height="278" rx="23" stroke="#252530"/>
  <ellipse cx="452" cy="120" rx="96" ry="86" fill="url(#accent)"/>
  <rect x="28" y="28" width="84" height="24" rx="12" fill="#191924" stroke="#282839"/>
  <text x="46" y="44" fill="#F9A8D4" font-family="'JetBrains Mono', Consolas, monospace" font-size="12">ai tool</text>
  <text x="28" y="98" fill="#F8FAFC" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="30" font-weight="700">SuggestPilot</text>
  <text x="28" y="128" fill="#CBD5E1" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="16">Context-aware autocomplete extension powered</text>
  <text x="28" y="151" fill="#CBD5E1" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="16">by LLM-assisted suggestion workflows.</text>
  <rect x="28" y="180" width="70" height="24" rx="12" fill="#14141D" stroke="#2A2A38"/>
  <text x="46" y="196" fill="#F9A8D4" font-family="'JetBrains Mono', Consolas, monospace" font-size="12">Chrome</text>
  <rect x="108" y="180" width="64" height="24" rx="12" fill="#14141D" stroke="#2A2A38"/>
  <text x="126" y="196" fill="#F9A8D4" font-family="'JetBrains Mono', Consolas, monospace" font-size="12">LLM</text>
  <rect x="182" y="180" width="122" height="24" rx="12" fill="#14141D" stroke="#2A2A38"/>
  <text x="200" y="196" fill="#F9A8D4" font-family="'JetBrains Mono', Consolas, monospace" font-size="12">Autocomplete</text>
  <line x1="28" y1="230.5" x2="532" y2="230.5" stroke="#232334"/>
  <text x="28" y="252" fill="#94A3B8" font-family="'JetBrains Mono', Consolas, monospace" font-size="12">Extension + repo</text>
  <rect x="390" y="44" width="122" height="154" rx="20" fill="#101018" stroke="#2B2B3A"/>
  <rect x="406" y="64" width="90" height="64" rx="14" fill="#181826"/>
  <rect x="418" y="78" width="66" height="10" rx="5" fill="#2A2A3A"/>
  <rect x="418" y="96" width="50" height="10" rx="5" fill="#2A2A3A"/>
  <rect x="406" y="138" width="90" height="24" rx="12" fill="#DB2777"/>
  <text x="421" y="155" fill="#FDF2F8" font-family="'JetBrains Mono', Consolas, monospace" font-size="11">suggest next</text>
  <text x="418" y="222" fill="#F8FAFC" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="40" font-weight="700">SP</text>
</svg>
